<div class="title">
    <h1>Se connecter</h1>
</div>
<form [formGroup]="loginForm" >
    <div class="form-group">
        <label for="login" id="label-login">E-mail ou nom d'utilisateur</label>
        <input type="text" id="login" formControlName="login">
    </div>
    <div class="form-group">
        <label for="password" id="password-login">Mot de passe</label>
        <input type="password" id="password" formControlName="password">
    </div>
    <div class="form-group">
        <button type="submit" (click)="onSubmit()" [disabled]="loginForm.invalid" id="button-login">Se connecter</button>
    </div>
</form>
