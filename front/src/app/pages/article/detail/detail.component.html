<div class="header">
    <button (click)="back()" aria-label="retour" class="back"><svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" width="41" height="23" margin="20" viewBox="0 0 41 23" fill="none">
    <path d="M0.439339 9.9853C-0.146446 10.5711 -0.146446 11.5208 0.439339 12.1066L9.98528 21.6526C10.5711 22.2383 11.5208 22.2383 12.1066 21.6526C12.6924 21.0668 12.6924 20.117 12.1066 19.5312L3.62132 11.046L12.1066 2.56068C12.6924 1.97489 12.6924 1.02514 12.1066 0.439358C11.5208 -0.146429 10.5711 -0.146429 9.98528 0.439358L0.439339 9.9853ZM40.5 9.54596L1.5 9.54596V12.546L40.5 12.546V9.54596Z" fill="black"/>
    </svg>
</button>
    <div class="title">
        <h1>{{ article.title | titlecase }}</h1>
    </div>
</div>    
<div class="information">
    <p>{{ article.created_at |  date:'dd/MM/yyyy' }}</p>
    <p>{{ article.username }}</p>
    <p>{{article.topic}}</p>
</div>
<div class="content">
    <p>{{ article.content }}</p>
</div>
<div class="content-title">
    <h2>Commentaires</h2>
</div>
@for (comment of article.comments; track comment.id) {
<div class="content-information">
    <p>{{ comment.username }}</p>
    <p id="content-information">{{ comment.content }}</p>
</div>
}

<form [formGroup]="commentForm" (ngSubmit)="onSubmit()" class="form">
    <div >
        <label for="content" class="visuallyhidden">Saisir un commentaire</label>
        <textarea id="content" formControlName="content" placeholder="Ecrivez un commentaire" class="comment"></textarea>
    </div>
    <div class="sent">
        <button type="submit" aria-label="envoyer"><svg aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
            <path d="M45.5 2.50006L21.85 26.1501" stroke="#7763C5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M45.5 2.50006L30.45 45.5001L21.85 26.1501L2.50002 17.5501L45.5 2.50006Z" stroke="#7763C5" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </div>
</form>
