<div class="article">
    <div class="title">
        <h2>{{ article?.title | titlecase}}</h2>
    </div>
    <div class="author">
        <p>{{ article?.created_at | date:'dd/MM/yyyy' }}</p>
        <p>{{ article?.username }}</p>
    </div>
    <div class="paragraph">
        <p>{{ article?.content }}</p>
    </div>
</div>
